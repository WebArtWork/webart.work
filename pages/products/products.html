<div class="wrapper">
	<div class="bg-primary">
		{{{'/waw/components/topbar'|c|safe}}}
		<section class="products-section section u-vertical-padding-section">
			<div class="container">
				<div class="products">
					<div class="products__control-panel">
						<div class="products__search-sort">
							<div class="products__search-select">
								<div class="products__search-trigger">
									<span>Newest</span>
									<img src="/waw/img/jobs/arrow-bottom.svg" alt="show" class="products__search-arrow">
								</div>
								<div class="products__search-options">
									<span class="products__search-option selected" data-value="newest">Newest</span>
									<span class="products__search-option" data-value="oldest">Oldest</span>
									<span class="products__search-option" data-value="popular">Popular</span>
									<span class="products__search-option" data-value="aproved">Aproved</span>
								</div>
							</div>
						</div>
						<div class="products__search-bar">
							<input type="text" placeholder="Search for goods..">
							<img src="/waw/img/jobs/search-icon.svg" alt="search-icon">
						</div>
					</div>

					<div class="cards-grid cards-grid--row-gap cards-grid--margin-reset">
						{% for product in products %}
						<div class="card-product">
							<a class="card-product__link" href="{{{product.url || '/product/' + product.id}}}">
								<img src="{{{product.thumb}}}" alt="item" class="card-product__img" />
							</a>
							<div class="card-product__info">
								<span class="card-product__name">{{{product.name}}}</span>
								<span class="card-product__price">{{{product.price}}}$</span>
							</div>
							<button class="card-product__btn" data-product="{{{product.id}}}" onclick="addToCart(this);">{{{in_cart(product)}}}</button>
						</div>
						{% endfor %}
					</div>
				</div>
			</div>
		</section>
	</div>
	{{{'/waw/components/footer'|c|safe}}}
</div>
