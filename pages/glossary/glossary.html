<div class="wrapper">
	<div class="bg-primary">
		{{{'/waw/components/topbar'|c|safe}}}
		<section class="glossary-section section u-vertical-padding-section">
			<div class="container">
				<div class="heading-primary u-align-text-center">
					Web Art Work <span>Glossary</span>
				</div>
				<div class="glossary__list">
					{% for phrase in phrases %}
					<div class="glossary__item">
						<div class="glossary__item-title">
							{{{phrase.name}}}
						</div>
						<div class="glossary__item-description">
							{{{phrase.description}}}
						</div>
					</div>
					{% endfor %}
				</div>

			</div>
		</section>
	</div>
	{{{'/waw/components/footer'|c|safe}}}
</div>
