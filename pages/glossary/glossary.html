<div class="wrapper">
	<div class="content">
		<div class="first-screen">
			<div class="container-a">
				{{{'/waw/components/topbar'|c|safe}}}
				<div class="glossary__main-title global-title">
					Web Art Work <span>Glossary</span>
				</div>
				<div class="glossary__list">
					{% for phrase in phrases %}
					<div class="glossary__item">
						<div class="glossary__item-title">
							{{{phrase.name}}}
						</div>
						<div class="glossary__item-description">
							{{{phrase.description}}}
						</div>
					</div>
					{% endfor %}
				</div>
			</div>
		</div>
	</div>
	{{{'/waw/components/footer'|c|safe}}}
</div>
