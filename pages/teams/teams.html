<div class="wrapper">
	<div class="bg-primary">
		{{{'/waw/components/topbar'|c|safe}}}
		<section class="teams-section u-vertical-padding-section">
			<div class="container">
				<div class="teams">
					{{{'/waw/components/sidebar'|c|safe}}}
					<div class="cards-grid cards-grid--row-gap u-left-margin">
						{% for team in teams %}
						<div class="card-team">
							<img src="{{{team.author.avatarUrl}}}" alt="avatar" class="card-team__img">
							<div class="card-team__name">
								{{{team.name}}}
							</div>
							<p class="card-team__description">
								{{{team.description}}}
							</p>
							<div class="card-team__members">
								<span>Members:</span>
								<ul class="card-team__members-list">
									{% for member in team.moderators %}
									<li>
										- {{{member.name}}}
									</li>
									{% endfor %}
								</ul>
							</div>
							<a href="/team/{{{team.id}}}" class="btn btn--visit">More info</a>
						</div>
						{% endfor %}
					</div>
				</div>
			</div>
		</section>
	</div>
	{{{'/waw/components/footer'|c|safe}}}
</div>
