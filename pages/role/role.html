<div class="wrapper">
	<div class="bg-primary">
		{{{'/waw/components/topbar'|c|safe}}}
		<div class="container">
			<section class="role-section u-vertical-padding-section">
				<div class="role">
					<div class="role__content">
						<h1 class="heading-primary heading-primary--yellow">{{{title}}}</h1>
						{{{html|safe}}}
						<img src="/waw/img/role/bottom-img.png" alt="" class="role__img">
					</div>
					<div class="role__items">
						{% for content in contents %}
						<div class="role__item">
							<img src="/waw/img/role/item-img.png" alt="item-img" class="role__item-img">
							<h6 class="heading-primary">
								<a href="{{{content.url}}}" class="role__item-link">
									{{{content.title}}}
								</a>
							</h6>
							<p class="role__item-text">
								{{{content.description}}}
							</p>
						</div>
						{% endfor %}
					</div>
				</div>
			</section>
		</div>
	</div>
	{{{'/waw/components/footer'|c|safe}}}
</div>
