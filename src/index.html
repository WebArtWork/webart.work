<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Web Art Work Community</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const storedMode = localStorage.getItem('app-mode');
				const preferredMode =
					storedMode === 'dark' || storedMode === 'light'
						? storedMode
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-mode', preferredMode);
			} catch {}
		</script>

		<meta
			name="description"
			content="Welcome to our freelance search and educational center platform! Here you will find the right freelancer for your project, as well as have the opportunity to learn and enhance your skills in our school, where we offer a variety of courses and training programs, and provide the opportunity to work with new technologies."
		/>
		<meta
			name="keywords"
			content="Web Art Work, freelance community, web development, mobile app development, IT education, internships, digital solutions, freelancers, Angular, Node.js"
		/>
		<meta name="author" content="Honchar Denys" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f0f14" media="(prefers-color-scheme: dark)" />

		<meta itemprop="name" content="Web Art Work Community" />

			itemprop="description"
			content="Welcome to our freelance search and educational center platform! Here you will find the right freelancer for your project, as well as have the opportunity to learn and enhance your skills in our school."
		/>
